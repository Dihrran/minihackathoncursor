<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events Calendar — UniGuide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <style>
    @media (min-width: 1024px) {
      .events-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
    }
  </style>
</head>
<body>
  <div class="ds-page-banner">
    <div class="ds-page-banner-inner">
      <h1 class="ds-page-title">Events Calendar</h1>
      <p class="ds-page-subtitle">Workshops, competitions, club events, career fairs, and guest lectures.</p>
    </div>
  </div>
  <main id="main-content" class="ds-main">
    <div id="type-filters" style="margin-bottom:1.5rem;"></div>
    <div class="events-layout">
      <div id="calendar-wrap"></div>
      <div>
        <h2 class="ds-section-title" id="events-date-title">Select a date</h2>
        <div id="events-list"></div>
      </div>
    </div>
  </main>
  <script type="module" src="/js/pages/events.js"></script>
</body>
</html>
