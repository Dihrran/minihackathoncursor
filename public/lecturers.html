<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecturer Directory — UniGuide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <div class="ds-page-banner" id="list-banner">
    <div class="ds-page-banner-inner">
      <h1 class="ds-page-title">Lecturer Directory</h1>
      <p class="ds-page-subtitle">Search faculty, office locations, consultation hours, and book appointments.</p>
    </div>
  </div>
  <main id="main-content" class="ds-main">
    <div id="list-view">
      <div style="display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;">
        <div style="flex:1;min-width:14rem;max-width:24rem;" id="search-wrap"></div>
        <div id="faculty-filter"></div>
      </div>
      <div id="lecturers-grid" class="ds-grid-2"></div>
      <div id="empty-state" hidden></div>
    </div>
    <div id="detail-view" hidden></div>
  </main>
  <script type="module" src="/js/pages/lecturers.js"></script>
</body>
</html>
